<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral Program - Freedom Patriot Enterprises</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .hero-header {
            background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.8)), url('https://picsum.photos/id/1077/2000/800');
            background-size: cover;
            background-position: center;
            height: 420px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- Navbar -->
    <nav class="bg-black/95 backdrop-blur-md border-b border-zinc-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <img src="logo.png" alt="Freedom Patriot Enterprises" class="h-14 w-auto">
            </a>

            <div class="hidden md:flex items-center gap-8 text-lg">
                <a href="index.html" class="hover:text-amber-400 transition">Home</a>
                <a href="referral.html" class="text-amber-400 font-semibold">Referrals</a>
            </div>

            <div class="flex items-center gap-6 text-sm">
                <a href="tel:850-XXX-XXXX" class="hidden sm:flex items-center gap-2 hover:text-amber-400">
                    <i class="fa-solid fa-phone"></i> (850) XXX-XXXX
                </a>
            </div>
        </div>
    </nav>

    <!-- Photo Header -->
    <header class="hero-header flex items-center justify-center text-center">
        <div>
            <h1 class="text-5xl md:text-6xl font-bold tracking-tight">Referral Program</h1>
            <p class="text-xl text-amber-300 mt-3">Refer a Friend • Help Us Grow</p>
        </div>
    </header>

    <section class="py-20 bg-zinc-900">
        <div class="max-w-3xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-10">Submit a Referral</h2>
            
            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-8 bg-zinc-800 p-10 rounded-3xl">
                <input type="text" name="referrer_name" placeholder="Your Full Name" required 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4">
                <input type="text" name="referred_name" placeholder="Friend or Client's Name" required 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4">
                <input type="email" name="email" placeholder="Your Email Address" required 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4">
                
                <button type="submit" class="w-full bg-amber-400 hover:bg-amber-500 text-black py-6 rounded-2xl font-bold text-xl transition">
                    Submit Referral
                </button>
            </form>
        </div>
    </section>

    <footer class="bg-zinc-950 py-12 text-center text-zinc-500">
        © 2026 Freedom Patriot Enterprises • DeFuniak Springs, FL
    </footer>
</body>
</html>
